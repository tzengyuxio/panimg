    "apt-get update && apt-get install -y curl && curl -LO https://www.nasm.us/pub/nasm/releasebuilds/2.16.03/nasm-2.16.03.tar.gz && tar xzf nasm-2.16.03.tar.gz && cd nasm-2.16.03 && ./configure && make install && cd .. && rm -rf nasm-2.16.03*"
]
