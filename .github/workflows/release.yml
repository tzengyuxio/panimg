name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Install NASM
        run: sudo apt-get install -y nasm

      - name: Check formatting
        run: cargo fmt --all --check

      # heic feature requires libheif >= 1.21 system library, skip in CI
      - name: Clippy
        run: cargo clippy --features avif,jxl,svg,pdf,text,tiny,icc -- -D warnings

      - name: Run tests
        run: cargo test --features avif,jxl,svg,pdf,text,tiny,icc

  build:
    name: Build (${{ matrix.target }})
    needs: ci
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            use-cross: true
            archive: tar.gz
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            use-cross: true
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            use-cross: true
            archive: tar.gz
          - target: x86_64-apple-darwin
            runner: macos-latest
            use-cross: false
            archive: tar.gz
          - target: aarch64-apple-darwin
            runner: macos-latest
            use-cross: false
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            use-cross: false
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install NASM (macOS)
        if: runner.os == 'macOS'
        run: brew install nasm

      - name: Install NASM (Windows)
        if: runner.os == 'Windows'
        run: choco install nasm

      - name: Install cross
        if: matrix.use-cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (cross)
        if: matrix.use-cross
        run: cross build --release --target ${{ matrix.target }} -p panimg-cli --features all-codecs

      - name: Build (cargo)
        if: "!matrix.use-cross"
        run: cargo build --release --target ${{ matrix.target }} -p panimg-cli --features all-codecs

      - name: Package (Unix)
        if: matrix.archive == 'tar.gz'
        run: |
          ARCHIVE_NAME="panimg-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir -p "${ARCHIVE_NAME}"
          cp target/${{ matrix.target }}/release/panimg "${ARCHIVE_NAME}/"
          cp LICENSE-MIT LICENSE-APACHE README.md "${ARCHIVE_NAME}/"
          tar czf "${ARCHIVE_NAME}.tar.gz" "${ARCHIVE_NAME}"
          shasum -a 256 "${ARCHIVE_NAME}.tar.gz" > "${ARCHIVE_NAME}.tar.gz.sha256"

      - name: Package (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $archiveName = "panimg-${{ github.ref_name }}-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $archiveName
          Copy-Item "target/${{ matrix.target }}/release/panimg.exe" "$archiveName/"
          Copy-Item "LICENSE-MIT", "LICENSE-APACHE", "README.md" "$archiveName/"
          Compress-Archive -Path "$archiveName/*" -DestinationPath "$archiveName.zip"
          $hash = (Get-FileHash "$archiveName.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  $archiveName.zip" | Out-File -Encoding ASCII "$archiveName.zip.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: panimg-${{ matrix.target }}
          path: |
            panimg-*.tar.gz
            panimg-*.tar.gz.sha256
            panimg-*.zip
            panimg-*.zip.sha256

  publish:
    name: Publish to crates.io
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install NASM
        run: sudo apt-get install -y nasm

      - name: Publish panimg-core
        run: cargo publish -p panimg-core || echo "panimg-core already published, skipping"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index update
        run: sleep 30

      - name: Publish panimg-cli
        run: cargo publish -p panimg-cli
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create checksums
        run: |
          cd artifacts
          cat *.sha256 > ../SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/panimg-*.tar.gz
            artifacts/panimg-*.zip
            artifacts/panimg-*.sha256
            SHA256SUMS.txt

  update-homebrew:
    name: Update Homebrew Formula
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: tzengyuxio/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Download SHA256 checksums
        run: |
          for target in aarch64-apple-darwin x86_64-apple-darwin aarch64-unknown-linux-gnu x86_64-unknown-linux-gnu; do
            curl -sL "https://github.com/tzengyuxio/panimg/releases/download/${GITHUB_REF_NAME}/panimg-${GITHUB_REF_NAME}-${target}.tar.gz.sha256" \
              | awk '{print $1}' > "${target}.sha256"
          done

      - name: Update Formula
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SHA_AARCH64_MACOS=$(cat aarch64-apple-darwin.sha256)
          SHA_X86_64_MACOS=$(cat x86_64-apple-darwin.sha256)
          SHA_AARCH64_LINUX=$(cat aarch64-unknown-linux-gnu.sha256)
          SHA_X86_64_LINUX=$(cat x86_64-unknown-linux-gnu.sha256)

          sed -i \
            -e "s/^  version \".*\"/  version \"${VERSION}\"/" \
            Formula/panimg.rb

          # Replace sha256 values in order of appearance:
          # 1st = aarch64-apple-darwin, 2nd = x86_64-apple-darwin
          # 3rd = aarch64-unknown-linux-gnu, 4th = x86_64-unknown-linux-gnu
          python3 - "$SHA_AARCH64_MACOS" "$SHA_X86_64_MACOS" "$SHA_AARCH64_LINUX" "$SHA_X86_64_LINUX" <<'PYEOF'
          import re, sys
          shas = sys.argv[1:5]
          with open("Formula/panimg.rb") as f:
              content = f.read()
          idx = 0
          def replacer(m):
              global idx
              result = f'sha256 "{shas[idx]}"'
              idx += 1
              return result
          content = re.sub(r'sha256 "[0-9a-f]{64}"', replacer, content)
          with open("Formula/panimg.rb", "w") as f:
              f.write(content)
          PYEOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/panimg.rb
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Update panimg to ${GITHUB_REF_NAME}"
          git push
