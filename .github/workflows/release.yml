name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Install NASM
        run: sudo apt-get install -y nasm

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-features -- -D warnings

      - name: Run tests
        run: cargo test --all-features

  build:
    name: Build (${{ matrix.target }})
    needs: ci
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            use-cross: true
            archive: tar.gz
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            use-cross: true
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            use-cross: true
            archive: tar.gz
          - target: x86_64-apple-darwin
            runner: macos-latest
            use-cross: false
            archive: tar.gz
          - target: aarch64-apple-darwin
            runner: macos-latest
            use-cross: false
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            use-cross: false
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install NASM (macOS)
        if: runner.os == 'macOS'
        run: brew install nasm

      - name: Install NASM (Windows)
        if: runner.os == 'Windows'
        run: choco install nasm

      - name: Install cross
        if: matrix.use-cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (cross)
        if: matrix.use-cross
        run: cross build --release --target ${{ matrix.target }} -p panimg-cli --features all-codecs

      - name: Build (cargo)
        if: "!matrix.use-cross"
        run: cargo build --release --target ${{ matrix.target }} -p panimg-cli --features all-codecs

      - name: Package (Unix)
        if: matrix.archive == 'tar.gz'
        run: |
          ARCHIVE_NAME="panimg-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir -p "${ARCHIVE_NAME}"
          cp target/${{ matrix.target }}/release/panimg "${ARCHIVE_NAME}/"
          cp LICENSE-MIT LICENSE-APACHE README.md "${ARCHIVE_NAME}/"
          tar czf "${ARCHIVE_NAME}.tar.gz" "${ARCHIVE_NAME}"
          shasum -a 256 "${ARCHIVE_NAME}.tar.gz" > "${ARCHIVE_NAME}.tar.gz.sha256"

      - name: Package (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $archiveName = "panimg-${{ github.ref_name }}-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $archiveName
          Copy-Item "target/${{ matrix.target }}/release/panimg.exe" "$archiveName/"
          Copy-Item "LICENSE-MIT", "LICENSE-APACHE", "README.md" "$archiveName/"
          Compress-Archive -Path "$archiveName/*" -DestinationPath "$archiveName.zip"
          $hash = (Get-FileHash "$archiveName.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  $archiveName.zip" | Out-File -Encoding ASCII "$archiveName.zip.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: panimg-${{ matrix.target }}
          path: |
            panimg-*.tar.gz
            panimg-*.tar.gz.sha256
            panimg-*.zip
            panimg-*.zip.sha256

  publish:
    name: Publish to crates.io
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install NASM
        run: sudo apt-get install -y nasm

      - name: Publish panimg-core
        run: cargo publish -p panimg-core || echo "panimg-core already published, skipping"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index update
        run: sleep 30

      - name: Publish panimg-cli
        run: cargo publish -p panimg-cli
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create checksums
        run: |
          cd artifacts
          cat *.sha256 > ../SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/panimg-*.tar.gz
            artifacts/panimg-*.zip
            artifacts/panimg-*.sha256
            SHA256SUMS.txt
